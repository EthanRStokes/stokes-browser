name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build release asset (linux-x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Stage release files
        run: |
          mkdir -p dist/stokes-browser-linux-x64
          cp target/x86_64-unknown-linux-gnu/release/stokes-browser dist/stokes-browser-linux-x64/
          cp -r assets dist/stokes-browser-linux-x64/

      - name: Package release files
        run: |
          tar -czf dist/stokes-browser-${{ github.ref_name }}-linux-x64.tar.gz -C dist stokes-browser-linux-x64

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          if-no-files-found: error
          path: dist/stokes-browser-${{ github.ref_name }}-linux-x64.tar.gz

  build-linux-arm64:
    name: Build release asset (linux-arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            python3-distutils \
            llvm \
            libclang-dev \
            clang \
            curl \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            cargo-binutils \
            librust-cargo-binutils-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Stage release files
        run: |
          mkdir -p dist/stokes-browser-linux-arm64
          cp target/aarch64-unknown-linux-gnu/release/stokes-browser dist/stokes-browser-linux-arm64/
          cp -r assets dist/stokes-browser-linux-arm64/

      - name: Package release files
        run: |
          tar -czf dist/stokes-browser-${{ github.ref_name }}-linux-arm64.tar.gz -C dist stokes-browser-linux-arm64

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64
          if-no-files-found: error
          path: dist/stokes-browser-${{ github.ref_name }}-linux-arm64.tar.gz

  build-windows:
    name: Build release asset (windows-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        shell: bash
        run: |
          curl -SL "https://github.com/servo/servo-build-deps/releases/download/msvc-deps/moztools-4.0.zip" --create-dirs -o target/dependencies/moztools.zip
          cd target/dependencies && unzip -qo moztools.zip -d .

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/stokes-browser-windows-x64 | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/stokes-browser.exe" "dist/stokes-browser-windows-x64/stokes-browser.exe"
          Copy-Item assets "dist/stokes-browser-windows-x64/assets" -Recurse

      - name: Package release files
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/stokes-browser-windows-x64/*" -DestinationPath "dist/stokes-browser-${{ github.ref_name }}-windows-x64.zip" -Force

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          if-no-files-found: error
          path: dist/stokes-browser-${{ github.ref_name }}-windows-x64.zip

  build-macos-arm64:
    name: Build release asset (macos-arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Stage release files
        run: |
          mkdir -p dist/stokes-browser-macos-arm64
          cp target/aarch64-apple-darwin/release/stokes-browser dist/stokes-browser-macos-arm64/
          cp -r assets dist/stokes-browser-macos-arm64/

      - name: Package release files
        run: |
          tar -czf dist/stokes-browser-${{ github.ref_name }}-macos-arm64.tar.gz -C dist stokes-browser-macos-arm64

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          if-no-files-found: error
          path: dist/stokes-browser-${{ github.ref_name }}-macos-arm64.tar.gz

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-linux-arm64
      - build-windows
      - build-macos-arm64

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
