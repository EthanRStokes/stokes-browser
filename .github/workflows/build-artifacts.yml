name: Build Artifacts

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build (linux-x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            llvm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stokes-browser-linux-x64
          if-no-files-found: error
          path: |
            target/x86_64-unknown-linux-gnu/release/stokes-browser
            assets/**

  build-linux-arm64:
    name: Build (linux-arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stokes-browser-linux-arm64
          if-no-files-found: error
          path: |
            target/aarch64-unknown-linux-gnu/release/stokes-browser
            assets/**

  build-windows:
    name: Build (windows-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        shell: bash
        run: |
          curl -SL "https://github.com/servo/servo-build-deps/releases/download/msvc-deps/moztools-4.0.zip" --create-dirs -o target/dependencies/moztools.zip
          cd target/dependencies && unzip -qo moztools.zip -d .

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stokes-browser-windows-x64
          if-no-files-found: error
          path: |
            target/x86_64-pc-windows-msvc/release/stokes-browser.exe
            assets/**

  build-macos-arm64:
    name: Build (macos-arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stokes-browser-macos-arm64
          if-no-files-found: error
          path: |
            target/aarch64-apple-darwin/release/stokes-browser
            assets/**
