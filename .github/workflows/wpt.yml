name: WPT

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wpt:
    name: Run WPT Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            unzip \
            xvfb \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap local WPT checkout
        run: python tools/wpt/bootstrap.py

      - name: Run WPT smoke manifest
        run: |
          mkdir -p wpt/results

          python third_party/wpt/wpt serve --config tools/wpt/serve-local.json --no-h2 > wpt-server.log 2>&1 &
          WPT_SERVER_PID=$!
          trap 'kill "$WPT_SERVER_PID" || true' EXIT

          for i in $(seq 1 60); do
            if curl -sS -o /dev/null http://127.0.0.1:8000/; then
              break
            fi
            sleep 1
          done

          xvfb-run -a cargo run --release -- --wpt-run \
            --manifest wpt/manifests/smoke.txt \
            --expectations wpt/expectations/known-failures.txt \
            --output wpt/results/latest.json

      - name: Upload WPT results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-results
          if-no-files-found: warn
          path: |
            wpt/results/latest.json
            wpt-server.log
