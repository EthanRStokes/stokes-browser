<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TextDecoder Test</title>
    <style>
        body { font-family: sans-serif; margin: 24px; }
        .ok { color: #157347; }
        .fail { color: #b02a37; }
        pre { background: #f6f8fa; padding: 12px; border-radius: 6px; }
    </style>
</head>
<body>
<h1>TextDecoder Test</h1>
<div id="results"></div>
<pre id="log"></pre>
<script>
    const results = document.getElementById('results');
    const log = document.getElementById('log');

    function write(msg) {
        log.textContent += msg + '\n';
        console.log(msg);
    }

    function test(name, fn) {
        const item = document.createElement('div');
        try {
            fn();
            item.className = 'ok';
            item.textContent = 'PASS: ' + name;
        } catch (err) {
            item.className = 'fail';
            item.textContent = 'FAIL: ' + name + ' -> ' + String(err);
        }
        results.appendChild(item);
    }

    test('TextDecoder exists with utf-8 defaults', () => {
        if (typeof TextDecoder !== 'function') {
            throw new Error('TextDecoder is not available');
        }
        const dec = new TextDecoder();
        if (dec.encoding !== 'utf-8') throw new Error('encoding=' + dec.encoding);
        if (dec.fatal !== false) throw new Error('fatal should default false');
        if (dec.ignoreBOM !== false) throw new Error('ignoreBOM should default false');
    });

    test('constructor accepts utf-8 aliases and rejects unsupported labels', () => {
        const alias = new TextDecoder('utf8');
        if (alias.encoding !== 'utf-8') throw new Error('alias not normalized');

        let threw = false;
        try {
            // latin1 should be unsupported in this runtime polyfill
            new TextDecoder('latin1');
        } catch (_err) {
            threw = true;
        }
        if (!threw) throw new Error('expected unsupported encoding to throw');
    });

    test('decodes ASCII and multi-byte UTF-8', () => {
        const dec = new TextDecoder();
        const ascii = dec.decode(new Uint8Array([0x48, 0x69]));
        if (ascii !== 'Hi') throw new Error('ascii=' + ascii);

        const emoji = dec.decode(new Uint8Array([0xF0, 0x9F, 0x98, 0x80]));
        if (emoji !== '😀') throw new Error('emoji=' + emoji);
    });

    test('decode accepts ArrayBuffer and DataView', () => {
        const dec = new TextDecoder();
        const ab = new Uint8Array([0x41, 0x42]).buffer;
        if (dec.decode(ab) !== 'AB') throw new Error('ArrayBuffer decode failed');

        const buf = new ArrayBuffer(4);
        const view = new DataView(buf);
        view.setUint8(1, 0xE2);
        view.setUint8(2, 0x82);
        view.setUint8(3, 0xAC);
        const sliced = new DataView(buf, 1, 3);
        if (dec.decode(sliced) !== '€') throw new Error('DataView decode failed');
    });

    test('invalid utf-8 yields replacement in non-fatal mode', () => {
        const dec = new TextDecoder();
        const out = dec.decode(new Uint8Array([0xE2, 0x28, 0xA1]));
        if (out.indexOf('\uFFFD') === -1) {
            throw new Error('expected replacement character, got=' + out);
        }
    });

    test('invalid utf-8 throws in fatal mode', () => {
        const dec = new TextDecoder('utf-8', { fatal: true });
        let threw = false;
        try {
            dec.decode(new Uint8Array([0xE2, 0x28, 0xA1]));
        } catch (_err) {
            threw = true;
        }
        if (!threw) throw new Error('expected fatal decode to throw');
    });

    test('BOM handling follows ignoreBOM option', () => {
        const withBom = new Uint8Array([0xEF, 0xBB, 0xBF, 0x61]);
        const strip = new TextDecoder();
        if (strip.decode(withBom) !== 'a') {
            throw new Error('default decoder should strip BOM');
        }

        const keep = new TextDecoder('utf-8', { ignoreBOM: true });
        const kept = keep.decode(withBom);
        if (kept.charCodeAt(0) !== 0xFEFF) {
            throw new Error('ignoreBOM decoder should keep BOM');
        }
    });

    test('streaming decode buffers incomplete sequence', () => {
        const dec = new TextDecoder();
        const first = dec.decode(new Uint8Array([0xF0, 0x9F]), { stream: true });
        const second = dec.decode(new Uint8Array([0x98, 0x80]), { stream: false });
        if (first !== '') throw new Error('expected empty first chunk, got=' + first);
        if (second !== '😀') throw new Error('expected completed emoji, got=' + second);
    });

    write('Finished TextDecoder checks.');
</script>
</body>
</html>
