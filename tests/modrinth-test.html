    <style>
        /* 1. Essential Modrinth CSS Variables for the environment */
        :root {

            display: flex;

            justify-content: center;
            min-height: 100vh;
            margin: 0;

        .gap-2 { gap: 0.5rem; }

        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .font-bold { font-weight: 700; }
        .text-white { color: #ffffff; }

        .hover\:bg-brand-highlight:hover { background-color: var(--color-brand-highlight); }
