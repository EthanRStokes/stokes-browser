<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Node Relations Test</title>
    <style>
        body { font-family: sans-serif; padding: 16px; }
        .ok { color: #0a7f2e; }
        .fail { color: #b00020; }
        #log { background: #f5f5f5; padding: 12px; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>firstChild/lastChild/siblings/children/childNodes</h1>
    <p>Regression test for node relation bindings on element wrappers.</p>

    <div id="fixture"></div>
    <div id="log"></div>

    <script>
        (function () {
            var logEl = document.getElementById("log");
            var failures = 0;

            function line(text, ok) {
                var div = document.createElement("div");
                div.className = ok ? "ok" : "fail";
                div.textContent = (ok ? "PASS: " : "FAIL: ") + text;
                logEl.appendChild(div);
                if (!ok) failures++;
            }

            function check(name, fn) {
                try {
                    var ok = !!fn();
                    line(name, ok);
                } catch (err) {
                    line(name + " threw " + String(err), false);
                }
            }

            var root = document.getElementById("fixture");
            var a = document.createElement("div");
            a.id = "a";
            var text = document.createTextNode("middle-text");
            var comment = document.createComment("middle-comment");
            var b = document.createElement("div");
            b.id = "b";
            var c = document.createElement("div");
            c.id = "c";

            root.appendChild(a);
            root.appendChild(text);
            root.appendChild(comment);
            root.appendChild(b);
            root.appendChild(c);

            check("root.firstChild is #a", function () {
                return root.firstChild && root.firstChild.id === "a";
            });

            check("root.lastChild is #c", function () {
                return root.lastChild && root.lastChild.id === "c";
            });

            check("b.previousSibling is comment node", function () {
                return b.previousSibling && b.previousSibling.nodeType === 8;
            });

            check("b.nextSibling is #c", function () {
                return b.nextSibling && b.nextSibling.id === "c";
            });

            check("root.children includes only element children", function () {
                return root.children
                    && root.children.length === 3
                    && root.children[0].id === "a"
                    && root.children[1].id === "b"
                    && root.children[2].id === "c";
            });

            check("root.childNodes includes element/text/comment", function () {
                return root.childNodes
                    && root.childNodes.length === 5
                    && root.childNodes[0].nodeType === 1
                    && root.childNodes[1].nodeType === 3
                    && root.childNodes[2].nodeType === 8
                    && root.childNodes[3].nodeType === 1
                    && root.childNodes[4].nodeType === 1;
            });

            check("edge siblings are null", function () {
                return a.previousSibling === null && c.nextSibling === null;
            });

            if (failures === 0) {
                console.log("node-relations-test: all checks passed");
            } else {
                console.log("node-relations-test: " + failures + " failure(s)");
            }
        })();
    </script>
</body>
</html>
